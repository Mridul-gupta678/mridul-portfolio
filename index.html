<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mridul Gupta — AI Engineer & Systems Architect</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#030308;--surface:#080812;--surface2:#0d0d1a;--border:rgba(255,255,255,0.06);
  --border-h:rgba(255,255,255,0.12);--accent:#e8ff47;--accent2:#7b6cff;--accent3:#ff6c6c;
  --text:#eeeef5;--muted:#4a4a62;--muted2:#7a7a96;--glass:rgba(255,255,255,0.03);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px}

body{
  background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;
  overflow-x:hidden;cursor:none;
}

/* CURSOR */
#cur{position:fixed;width:8px;height:8px;background:var(--accent);border-radius:50%;
  pointer-events:none;z-index:99999;transform:translate(-50%,-50%);
  transition:width .2s,height .2s,background .2s;mix-blend-mode:difference;}
#cur-ring{position:fixed;width:32px;height:32px;border:1px solid rgba(232,255,71,.3);
  border-radius:50%;pointer-events:none;z-index:99998;transform:translate(-50%,-50%);
  transition:width .3s,height .3s,border-color .3s;will-change:transform;}
body.on-link #cur{width:5px;height:5px}
body.on-link #cur-ring{width:48px;height:48px;border-color:rgba(232,255,71,.15)}
body.on-btn #cur{width:6px;height:6px;background:#fff}
body.on-btn #cur-ring{width:56px;height:56px;border-color:rgba(255,255,255,.15)}

/* GRAIN */
body::after{content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.03'/%3E%3C/svg%3E");
  pointer-events:none;z-index:9998;}

/* BOOT SCREEN */
#boot{
  position:fixed;inset:0;background:#030308;z-index:9990;
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  transition:opacity .8s ease, transform .8s ease;
}
#boot.fade-out{opacity:0;transform:scale(1.03);pointer-events:none}
.boot-inner{width:480px;max-width:90vw}
.boot-logo{
  font-family:'Instrument Serif',serif;font-size:1.3rem;color:var(--accent);
  letter-spacing:.02em;margin-bottom:2rem;
  display:flex;align-items:center;gap:.7rem;
}
.boot-logo-bracket{color:var(--muted);font-size:1rem}
.boot-line{
  font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--muted2);
  letter-spacing:.12em;margin-bottom:.6rem;display:flex;align-items:center;gap:1rem;
  opacity:0;transform:translateX(-8px);
  transition:opacity .3s,transform .3s;
}
.boot-line.show{opacity:1;transform:translateX(0)}
.boot-line .status{
  margin-left:auto;font-size:.65rem;letter-spacing:.08em;padding:.15rem .6rem;
  border-radius:100px;
}
.status-ready{color:#4ade80;background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.2)}
.status-loading{color:var(--accent);background:rgba(232,255,71,.08);border:1px solid rgba(232,255,71,.15)}
.boot-bar{height:1px;background:var(--border);margin:2rem 0;overflow:hidden}
.boot-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));width:0%;transition:width .5s ease}
.boot-final{
  font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--accent);
  letter-spacing:.2em;text-transform:uppercase;opacity:0;transition:opacity .5s;
  text-align:center;margin-top:1rem;
}
.boot-final.show{opacity:1}
.boot-cursor{display:inline-block;width:2px;height:.9em;background:var(--accent);
  margin-left:2px;animation:blink .8s step-end infinite}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;justify-content:space-between;align-items:center;
  padding:1.4rem 4rem;transition:background .4s,border-color .4s;
}
nav.scrolled{background:rgba(3,3,8,.88);backdrop-filter:blur(24px);border-bottom:1px solid var(--border)}
.nav-logo{font-family:'Instrument Serif',serif;font-size:1.4rem;color:var(--text);letter-spacing:-.02em;text-decoration:none}
.nav-logo span{color:var(--accent)}
.nav-links{display:flex;gap:2rem;list-style:none;align-items:center}
.nav-links a{
  color:var(--muted2);text-decoration:none;font-size:.7rem;letter-spacing:.15em;
  text-transform:uppercase;font-family:'JetBrains Mono',monospace;transition:color .2s;
}
.nav-links a:hover{color:var(--accent)}
.nav-cta{
  font-family:'JetBrains Mono',monospace;font-size:.65rem;letter-spacing:.1em;
  color:var(--bg);background:var(--accent);padding:.35rem .9rem;
  border-radius:100px;text-transform:uppercase;text-decoration:none;transition:opacity .2s;
}
.nav-cta:hover{opacity:.85}

/* CANVAS */
#neural-canvas{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.4}

/* HERO */
#hero{
  min-height:100vh;display:flex;align-items:center;
  padding:8rem 4rem 4rem;position:relative;overflow:hidden;z-index:1;
}
.hero-grid{
  position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,.015) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px);
  background-size:60px 60px;
  -webkit-mask-image:radial-gradient(ellipse 70% 60% at 60% 50%,black 30%,transparent 100%);
  mask-image:radial-gradient(ellipse 70% 60% at 60% 50%,black 30%,transparent 100%);
}
.hero-glow{
  position:absolute;width:700px;height:700px;border-radius:50%;
  background:radial-gradient(ellipse,rgba(123,108,255,.1) 0%,transparent 70%);
  top:-200px;right:-100px;animation:drift 18s ease-in-out infinite;pointer-events:none;
}
.hero-glow2{
  position:absolute;width:400px;height:400px;border-radius:50%;
  background:radial-gradient(ellipse,rgba(232,255,71,.06) 0%,transparent 70%);
  bottom:0;left:5%;animation:drift 14s ease-in-out infinite reverse;pointer-events:none;
}
@keyframes drift{
  0%,100%{transform:translate(0,0) scale(1)}
  33%{transform:translate(30px,-40px) scale(1.06)}
  66%{transform:translate(-20px,25px) scale(.96)}
}
.hero-content{position:relative;max-width:1000px;z-index:2}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:.6rem;
  background:rgba(255,255,255,.03);border:1px solid var(--border);
  border-radius:100px;padding:.4rem 1rem;
  font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--muted2);
  margin-bottom:2.5rem;opacity:0;animation:fadeUp .6s ease forwards .1s;
}
.eyebrow-dot{width:6px;height:6px;background:#4ade80;border-radius:50%;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.hero-h1{
  font-family:'Instrument Serif',serif;
  font-size:clamp(3.8rem,9.5vw,8rem);
  line-height:.92;letter-spacing:-.03em;margin-bottom:2rem;
  opacity:0;animation:fadeUp .8s ease forwards .3s;
}
.hero-h1 .line-ghost{
  display:block;color:transparent;-webkit-text-stroke:1px rgba(255,255,255,.2);
  font-style:italic;
}
.hero-h1 .accent{color:var(--accent);font-style:italic;-webkit-text-stroke:0}
.hero-roles{
  display:flex;align-items:center;gap:.8rem;margin-bottom:3rem;height:1.8rem;
  opacity:0;animation:fadeUp .8s ease forwards .5s;
}
.role-prefix{font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--muted);letter-spacing:.05em}
.role-text{
  font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--accent);
  letter-spacing:.05em;position:relative;
}
.role-text::after{content:'_';animation:blink .7s step-end infinite}
.hero-desc{
  font-size:1.05rem;color:var(--muted2);line-height:1.85;max-width:480px;
  margin-bottom:3rem;opacity:0;animation:fadeUp .8s ease forwards .7s;
}
.hero-ctas{
  display:flex;gap:1rem;flex-wrap:wrap;
  opacity:0;animation:fadeUp .8s ease forwards .9s;
}
.btn{
  display:inline-flex;align-items:center;gap:.6rem;padding:.9rem 2rem;
  font-family:'JetBrains Mono',monospace;font-size:.72rem;letter-spacing:.08em;
  text-transform:uppercase;text-decoration:none;border-radius:3px;
  transition:all .25s;cursor:none;border:none;font-weight:500;
}
.btn-y{background:var(--accent);color:#03030a}
.btn-y:hover{background:#efff6f;transform:translateY(-3px);box-shadow:0 12px 30px rgba(232,255,71,.2)}
.btn-g{background:transparent;color:var(--muted2);border:1px solid var(--border)}
.btn-g:hover{border-color:var(--border-h);color:var(--text);transform:translateY(-3px)}
.hero-scroll{
  position:absolute;bottom:2.5rem;right:4rem;
  display:flex;flex-direction:column;align-items:center;gap:.6rem;
  opacity:0;animation:fadeUp .8s ease forwards 1.2s;
}
.scroll-txt{
  font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--muted);
  letter-spacing:.2em;text-transform:uppercase;writing-mode:vertical-rl;
}
.scroll-line{width:1px;height:50px;background:linear-gradient(to bottom,var(--muted),transparent);
  animation:scrollY 2s ease-in-out infinite}
@keyframes scrollY{
  0%{transform:scaleY(0);transform-origin:top}
  50%{transform:scaleY(1);transform-origin:top}
  51%{transform:scaleY(1);transform-origin:bottom}
  100%{transform:scaleY(0);transform-origin:bottom}
}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

/* TICKER */
.ticker{border-top:1px solid var(--border);border-bottom:1px solid var(--border);
  background:var(--surface);padding:1rem 0;overflow:hidden;position:relative;z-index:1}
.ticker-track{display:flex;gap:0;animation:tick 22s linear infinite;width:max-content}
.ticker-item{
  font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--muted);
  letter-spacing:.15em;text-transform:uppercase;padding:0 2rem;white-space:nowrap;
  display:flex;align-items:center;gap:2rem;
}
.ticker-item::after{content:'◆';color:var(--accent);font-size:.5rem}
@keyframes tick{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* SECTION COMMON */
section{position:relative;z-index:1}
.container{max-width:1100px;margin:0 auto;padding:0 4rem}
.s-tag{
  font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--accent);
  letter-spacing:.25em;text-transform:uppercase;margin-bottom:.8rem;
  display:flex;align-items:center;gap:.8rem;
}
.s-tag::before{content:'//';color:var(--muted)}
.s-h{
  font-family:'Instrument Serif',serif;font-size:clamp(2rem,4vw,3.2rem);
  line-height:1.05;letter-spacing:-.02em;margin-bottom:1rem;
}
.s-h em{color:var(--accent);font-style:italic}

/* REVEAL ANIMATION */
.reveal{opacity:0;transform:translateY(30px);transition:opacity .7s ease,transform .7s ease}
.reveal.visible{opacity:1;transform:translateY(0)}

/* ABOUT */
#about{padding:8rem 0}
.about-grid{display:grid;grid-template-columns:1.2fr 1fr;gap:5rem;align-items:start}
.about-body p{font-size:1rem;color:var(--muted2);line-height:1.95;margin-bottom:1.3rem}
.about-body p strong{color:var(--text);font-weight:500}
.about-tags{margin-top:1.5rem;display:flex;flex-wrap:wrap;gap:.4rem}
.atag{
  font-family:'JetBrains Mono',monospace;font-size:.66rem;padding:.28rem .7rem;
  border:1px solid var(--border);border-radius:3px;color:var(--muted2);transition:all .2s;
}
.atag:hover{border-color:var(--accent);color:var(--accent)}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--border);background:var(--surface)}
.stat{
  padding:2rem;border-right:1px solid var(--border);border-bottom:1px solid var(--border);
  transition:background .2s;
}
.stat:hover{background:var(--surface2)}
.stat-n{
  font-family:'Instrument Serif',serif;font-size:3rem;color:var(--accent);
  line-height:1;letter-spacing:-.02em;
}
.stat-l{
  font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--muted);
  text-transform:uppercase;letter-spacing:.12em;margin-top:.5rem;
}

/* SKILLS */
#skills{padding:8rem 0;background:var(--surface)}
.skills-grid{display:grid;grid-template-columns:repeat(5,1fr);border:1px solid var(--border)}
.sk-col{padding:2rem 1.5rem;border-right:1px solid var(--border);transition:background .2s}
.sk-col:last-child{border-right:none}
.sk-col:hover{background:rgba(255,255,255,.015)}
.sk-head{
  font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--accent);
  text-transform:uppercase;letter-spacing:.2em;margin-bottom:1.5rem;
  padding-bottom:.8rem;border-bottom:1px solid var(--border);
}
.sk-item{
  font-size:.82rem;color:var(--muted2);padding:.35rem 0;
  display:flex;align-items:center;gap:.5rem;transition:color .2s;
}
.sk-item::before{content:'';width:3px;height:3px;background:var(--border-h);border-radius:50%;flex-shrink:0}
.sk-item:hover{color:var(--text)}
.sk-item:hover::before{background:var(--accent)}

/* PROJECTS */
#projects{padding:8rem 0}
.proj-list{display:grid;gap:1px;background:var(--border);border:1px solid var(--border)}
.proj-row{
  background:var(--bg);display:grid;grid-template-columns:72px 1fr 160px;
  transition:background .25s;position:relative;overflow:hidden;
}
.proj-row::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:2px;
  background:var(--accent);transform:scaleY(0);transform-origin:bottom;
  transition:transform .3s ease;
}
.proj-row:hover::before{transform:scaleY(1)}
.proj-row:hover{background:var(--surface)}
.proj-num{
  display:flex;align-items:flex-start;padding:2.5rem 1.8rem;
  font-family:'Instrument Serif',serif;font-size:2.2rem;color:var(--border-h);
  line-height:1;font-style:italic;border-right:1px solid var(--border);
}
.proj-body{padding:2.5rem 2rem}
.proj-cat{
  font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--muted);
  letter-spacing:.2em;text-transform:uppercase;margin-bottom:.7rem;
}
.proj-name{
  font-family:'Instrument Serif',serif;font-size:1.7rem;color:var(--text);
  margin-bottom:.7rem;line-height:1.1;letter-spacing:-.01em;
}
.proj-desc{font-size:.86rem;color:var(--muted2);line-height:1.8;max-width:560px;margin-bottom:1.2rem}
.ptags{display:flex;flex-wrap:wrap;gap:.35rem}
.pt{
  font-family:'JetBrains Mono',monospace;font-size:.62rem;
  padding:.22rem .6rem;border-radius:2px;letter-spacing:.04em;
}
.pt-g{color:#4ade80;background:rgba(74,222,128,.07);border:1px solid rgba(74,222,128,.15)}
.pt-p{color:#a78bfa;background:rgba(167,139,250,.07);border:1px solid rgba(167,139,250,.15)}
.pt-y{color:var(--accent);background:rgba(232,255,71,.05);border:1px solid rgba(232,255,71,.12)}
.pt-r{color:#f87171;background:rgba(248,113,113,.07);border:1px solid rgba(248,113,113,.15)}
.pt-b{color:#60a5fa;background:rgba(96,165,250,.07);border:1px solid rgba(96,165,250,.15)}
.proj-aside{
  display:flex;flex-direction:column;justify-content:space-between;
  padding:2.5rem 2rem;border-left:1px solid var(--border);
}
.proj-badge{
  font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:.1em;
  text-transform:uppercase;padding:.28rem .7rem;border-radius:100px;align-self:flex-start;
}
.b-feat{color:var(--accent);background:rgba(232,255,71,.08);border:1px solid rgba(232,255,71,.18)}
.b-ai{color:#a78bfa;background:rgba(167,139,250,.08);border:1px solid rgba(167,139,250,.18)}
.b-res{color:#f87171;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.15)}
.b-new{color:#4ade80;background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.15)}
.proj-link{
  font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--muted);
  text-decoration:none;letter-spacing:.08em;text-transform:uppercase;
  display:inline-flex;align-items:center;gap:.4rem;padding:.45rem .8rem;
  border:1px solid var(--border);border-radius:2px;transition:all .2s;white-space:nowrap;
}
.proj-link:hover{color:var(--accent);border-color:rgba(232,255,71,.25)}

/* AI ASSISTANT */
#ai-chat{padding:8rem 0;background:var(--surface)}
.chat-wrap{
  display:grid;grid-template-columns:1fr 1.2fr;gap:5rem;align-items:start;
}
.chat-ui{
  background:var(--bg);border:1px solid var(--border);border-radius:4px;overflow:hidden;
  position:relative;
}
.chat-ui::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent2),transparent);opacity:.4;
}
.chat-header{
  padding:1.2rem 1.5rem;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:.8rem;
}
.chat-ai-dot{
  width:8px;height:8px;background:var(--accent2);border-radius:50%;
  animation:blink 1.8s ease-in-out infinite;box-shadow:0 0 6px rgba(123,108,255,.6);
}
.chat-title{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--text);letter-spacing:.08em}
.chat-sub{font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--muted);letter-spacing:.05em;margin-left:auto}
.chat-msgs{height:340px;overflow-y:auto;padding:1.5rem;display:flex;flex-direction:column;gap:1rem;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.msg{display:flex;flex-direction:column;gap:.3rem;animation:fadeUp .3s ease}
.msg-user{align-items:flex-end}
.msg-ai{align-items:flex-start}
.msg-bubble{
  max-width:85%;padding:.7rem 1rem;border-radius:3px;
  font-size:.82rem;line-height:1.6;
}
.bubble-user{background:rgba(232,255,71,.08);border:1px solid rgba(232,255,71,.15);color:var(--text)}
.bubble-ai{background:rgba(123,108,255,.08);border:1px solid rgba(123,108,255,.15);color:var(--text)}
.msg-sender{font-family:'JetBrains Mono',monospace;font-size:.56rem;color:var(--muted);letter-spacing:.08em}
.typing-dots span{
  display:inline-block;width:4px;height:4px;background:var(--accent2);
  border-radius:50%;margin:0 1px;animation:bounce .8s ease-in-out infinite;
}
.typing-dots span:nth-child(2){animation-delay:.15s}
.typing-dots span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.chat-input-row{
  padding:1rem 1.5rem;border-top:1px solid var(--border);
  display:flex;gap:.8rem;align-items:center;
}
.chat-input{
  flex:1;background:transparent;border:none;outline:none;
  font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--text);
  letter-spacing:.03em;caret-color:var(--accent);
}
.chat-input::placeholder{color:var(--muted)}
.chat-send{
  background:var(--accent);color:var(--bg);border:none;border-radius:2px;
  padding:.45rem .8rem;font-family:'JetBrains Mono',monospace;font-size:.65rem;
  letter-spacing:.08em;text-transform:uppercase;cursor:none;transition:opacity .2s;
}
.chat-send:hover{opacity:.85}
.chat-prompts{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:1.5rem}
.cprompt{
  font-family:'JetBrains Mono',monospace;font-size:.62rem;
  padding:.35rem .8rem;border:1px solid var(--border);border-radius:100px;
  color:var(--muted2);cursor:none;transition:all .2s;background:transparent;
}
.cprompt:hover{border-color:var(--accent2);color:var(--accent2)}

/* SYSTEMS SECTION */
#systems{padding:8rem 0}
.sys-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border:1px solid var(--border)}
.sys-card{
  background:var(--bg);padding:2rem;transition:background .25s;position:relative;overflow:hidden;
}
.sys-card:hover{background:var(--surface)}
.sys-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent2),transparent);
  opacity:0;transition:opacity .3s;
}
.sys-card:hover::before{opacity:.5}
.sys-icon{
  font-size:1.4rem;margin-bottom:1.2rem;
  display:flex;align-items:center;justify-content:center;
  width:44px;height:44px;background:rgba(255,255,255,.03);
  border:1px solid var(--border);border-radius:4px;
}
.sys-name{font-family:'Syne',sans-serif;font-size:.92rem;font-weight:600;margin-bottom:.5rem;color:var(--text)}
.sys-desc{font-size:.8rem;color:var(--muted2);line-height:1.7}
.sys-tag{
  margin-top:1rem;font-family:'JetBrains Mono',monospace;font-size:.58rem;
  color:var(--accent2);letter-spacing:.1em;
}

/* CURRENTLY BUILDING */
#building{padding:8rem 0;background:var(--surface)}
.build-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem}
